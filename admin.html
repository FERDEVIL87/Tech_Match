<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMatch - Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        h2 { margin-top: 0; color: #818cf8; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        textarea { width: 100%; height: 450px; background: #0f172a; color: #10b981; font-family: monospace; font-size: 14px; padding: 15px; border: 1px solid #334155; border-radius: 8px; margin-top: 15px; box-sizing: border-box; resize: vertical; }
        textarea:focus { outline: none; border-color: #6366f1; }
        button { background: #6366f1; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #4f46e5; }
        .status { margin-top: 15px; font-weight: bold; font-size: 14px; }
        .warning { background: #7f1d1d; color: #fca5a5; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; border: 1px solid #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚙️ TechMatch Admin Panel</h2>
        <p>Ubah teks Landing Page di dalam kotak di bawah ini. Pastikan kamu <strong>tidak menghapus tanda kutip ganda (") atau kurung kurawal ({})</strong> agar format data tidak rusak.</p>
        
        <div class="warning">
            ⚠️ <strong>Perhatian:</strong> Halaman ini bersifat rahasia. Jangan berikan link ini kepada orang lain.
        </div>

        <textarea id="jsonEditor">Mengambil data dari database...</textarea>
        <br>
        <button onclick="saveData()">💾 Simpan ke Database</button>
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // 1. Ambil data dari MySQL saat halaman admin dibuka
        fetch('/api/landing')
            .then(res => res.json())
            .then(data => {
                // Tampilkan data ke dalam textarea agar bisa diedit Admin
                document.getElementById('jsonEditor').value = JSON.stringify(data, null, 4);
            })
            .catch(err => {
                document.getElementById('jsonEditor').value = "Gagal memuat data. Pastikan database terhubung.";
            });

        // 2. Fungsi untuk menyimpan data kembali ke MySQL
        async function saveData() {
            const btn = document.querySelector('button');
            const status = document.getElementById('statusMessage');
            const rawData = document.getElementById('jsonEditor').value;

            try {
                // Pastikan admin tidak tidak sengaja merusak format (misal kurang tanda kutip)
                const parsedData = JSON.parse(rawData);
                
                btn.innerText = "⏳ Menyimpan...";
                status.innerText = "";
                
                const response = await fetch('/api/landing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(parsedData)
                });

                const result = await response.json();
                
                if(response.ok) {
                    status.style.color = "#10b981"; // Hijau
                    status.innerText = "✅ " + result.message;
                } else {
                    status.style.color = "#ef4444"; // Merah
                    status.innerText = "❌ Gagal: " + result.error;
                }
            } catch (e) {
                status.style.color = "#ef4444";
                status.innerText = "❌ Error: Format penulisan salah. Cek kembali tanda kutip atau koma yang mungkin terhapus.";
            }
            
            btn.innerText = "💾 Simpan ke Database";
            // Hilangkan pesan sukses setelah 4 detik
            setTimeout(() => { status.innerText = ""; }, 4000);
        }
    </script>
</body>
</html>
